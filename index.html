<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Moroska Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main: #5d7a6d; --bg: #fcfcfc; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding-bottom: 100px; }
        .header { position: sticky; top: 0; background: white; padding: 10px; z-index: 100; border-bottom: 1px solid #eee; }
        .search-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card-content { padding: 10px; }
        .card-title { font-size: 14px; font-weight: 600; height: 36px; overflow: hidden; }
        .card-price { color: var(--main); font-weight: bold; margin-top: 5px; }
        
        /* Модалка */
        #productModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; overflow-y: auto; }
        .modal-close { position: fixed; top: 15px; right: 15px; background: rgba(0,0,0,0.1); width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1010; }
        .carousel { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; }
        .carousel img { width: 100%; flex-shrink: 0; scroll-snap-align: start; }
        .modal-info { padding: 20px; }

        /* Навигация */
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #eee; height: 60px; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; text-align: center; line-height: 60px; font-size: 12px; font-weight: bold; color: #aaa; text-transform: uppercase; }
        .nav-item.active { color: var(--main); }

        #successScreen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; text-align: center; padding-top: 100px; }
    </style>
</head>
<body>

<div class="header">
    <input type="text" id="searchInput" class="search-input" placeholder="Поиск..." oninput="handleSearch()">
</div>

<div id="app" class="grid"></div>

<div id="productModal">
    <div class="modal-close" onclick="closeModal()">✕</div>
    <div id="modalContent"></div>
</div>

<div id="successScreen">
    <h1>Заказ отправлен!</h1>
    <p>Я скоро напишу вам в Telegram.</p>
    <button onclick="location.reload()" style="background:var(--main); color:white; border:none; padding:15px; border-radius:10px;">Вернуться в магазин</button>
</div>

<div class="nav">
    <div class="nav-item active" onclick="changeTab('Stock', this)">Наличие</div>
    <div class="nav-item" onclick="changeTab('Catalog', this)">Каталог</div>
    <div class="nav-item" onclick="changeTab('Fabrics', this)">Ткани</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // !!! ЗАМЕНИ ЭТУ ССЫЛКУ НА СВОЮ !!!
    const API_URL = "https://script.google.com/macros/s/AKfycbyCUeY_FBmN-d-4EkbznhcJX6j-Iu6oL-peMKLynSOdK_zZ-Ie7uYxr4jw-xZVsWDQogw/exec";

    let currentData = {};
    let currentTab = 'Stock';
    let activeProduct = null;

    async function init() {
        const app = document.getElementById('app');
        app.innerHTML = '<p style="grid-column:1/-1; text-align:center;">Загрузка мастерской...</p>';
        try {
            const response = await fetch(API_URL);
            currentData = await response.json();
            render(currentData.Stock || []);
        } catch (e) {
            app.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:red;">Ошибка загрузки. Проверьте ссылку в коде или доступ к таблице.</p>';
        }
    }

    function render(items) {
        const app = document.getElementById('app');
        if (!items || items.length === 0) {
            app.innerHTML = '<p style="grid-column:1/-1; text-align:center;">Пусто</p>';
            return;
        }
        app.innerHTML = items.map((item, idx) => {
            const isFab = currentTab === 'Fabrics';
            const title = isFab ? (item.Название_ткани || "Ткань") : (item.Название || "Товар");
            const photo = (isFab ? (item.ОписаниеФото || "") : (item.Фото || "")).split(',')[0].trim();
            const price = item.Цена || 0;
            
            return `
                <div class="card" onclick="openProduct('${currentTab}', ${idx})">
                    <img src="${photo || 'https://via.placeholder.com/300'}" onerror="this.style.opacity='0.3'">
                    <div class="card-content">
                        <div class="card-title">${title}</div>
                        <div class="card-price">${isFab ? '' : price + ' RSD'}</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function openProduct(tab, idx) {
        const item = currentData[tab][idx];
        const isFab = tab === 'Fabrics';
        activeProduct = isFab ? null : { name: item.Название, price: item.Цена };

        const modal = document.getElementById('productModal');
        const content = document.getElementById('modalContent');
        const photos = (isFab ? (item.ОписаниеФото || "") : (item.Фото || "")).split(',').map(p => p.trim()).filter(p => p);

        content.innerHTML = `
            <div class="carousel">
                ${photos.map(p => `<img src="${p}">`).join('')}
            </div>
            <div class="modal-info">
                <h2>${isFab ? item.Название_ткани : item.Название}</h2>
                ${isFab ? `<p><b>Тип:</b> ${item.Тип || ""}</p>` : `<h3 style="color:#5d7a6d">${item.Цена} RSD</h3>`}
                <p style="white-space:pre-wrap;">${item.Описание || ""}</p>
            </div>
        `;
        modal.style.display = 'block';
        
        if (!isFab) {
            tg.MainButton.setText("ЗАКАЗАТЬ").show();
        } else {
            tg.MainButton.hide();
        }
    }

    tg.MainButton.onClick(async () => {
        tg.MainButton.showProgress();
        const user = tg.initDataUnsafe.user || {id: 0, first_name: "Guest"};
        try {
            await fetch(API_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({
                    item: activeProduct.name,
                    price: activeProduct.price,
                    user_id: user.id,
                    user_name: user.first_name,
                    user_username: user.username
                })
            });
            setTimeout(() => {
                document.getElementById('successScreen').style.display = 'block';
                tg.MainButton.hide();
            }, 500);
        } catch (e) { alert("Ошибка!"); }
        finally { tg.MainButton.hideProgress(); }
    });

    function closeModal() {
        document.getElementById('productModal').style.display = 'none';
        tg.MainButton.hide();
    }

    function changeTab(tab, el) {
        currentTab = tab;
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        render(currentData[tab] || []);
    }

    function handleSearch() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = currentData[currentTab].filter(item => {
            const name = (item.Название || item.Название_ткани || "").toLowerCase();
            return name.includes(query);
        });
        render(filtered);
    }

    init();
</script>
</body>
</html>
