<script>
    const tg = window.Telegram.WebApp;
    // ПОСЛЕ ДЕПЛОЯ ВСТАВЬ НОВУЮ ССЫЛКУ СЮДА!
    const API_URL = "https://script.google.com/macros/s/AKfycbza9U1cn6OrhGRZA8hRpNePhzDYN5CmxiSCKJ1Ad4JavJSAtTdbkySj9MsanAKhErXb/exec";
    
    let currentData = {}, currentTab = 'Stock', activeItem = null;

    const esc = (str) => String(str || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

    // Функция отрисовки данных
    function handleData(data) {
        currentData = data;
        if (currentData && currentData[currentTab]) {
            document.getElementById('skeleton-loader').style.display = 'none';
            document.getElementById('app').style.display = 'grid';
            render(currentData[currentTab]);
        } else {
            console.error("Данные вкладки не найдены:", currentTab);
        }
    }

    // Инициализация через Fetch
    async function init() {
        tg.ready(); 
        tg.expand();
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            handleData(data);
        } catch (err) {
            console.error("Ошибка загрузки данных:", err);
            // alert("Ошибка загрузки витрины. Проверьте соединение.");
        }
    }

    function render(items) {
        const app = document.getElementById('app');
        app.innerHTML = (items || []).map((item, index) => {
            const isFab = currentTab === 'Fabrics';
            const title = isFab ? item.Название_ткани : item.Название;
            const photo = (item.Фото || "").split(',')[0].trim();
            const oldPrice = item.Старая_цена || item['Старая цена'];
            const isBooked = item.Статус === true || item.Статус === "TRUE";
            const hasDiscount = !isFab && item.Скидка;
            
            return `
                <div class="card" onclick="openProduct('${currentTab}', ${index})">
                    ${hasDiscount ? `<div class="sale-badge">${esc(item.Скидка)}</div>` : ''}
                    ${isBooked ? `<div class="booked-badge ${!hasDiscount ? 'booked-only' : ''}">ЗАБРОНИРОВАНО</div>` : ''}
                    <img src="${photo}" onerror="this.src='https://via.placeholder.com/300x375?text=Moroska'">
                    <div class="card-content">
                        <div class="card-title">${esc(title)}</div>
                        <div class="price-stack">
                            ${(!isFab && oldPrice) ? `<span class="old-p">${esc(oldPrice)}</span>` : ''}
                            ${!isFab ? `<span class="card-price">${esc(item.Цена)} RSD</span>` : '<span style="font-size:10px;color:#999;">Ткань</span>'}
                        </div>
                    </div>
                </div>`;
        }).join('');
    }

    // ... функции openProduct, updateDots, moveSlide, closeModal остаются без изменений ...

    async function handleOrder() {
        if (activeItem.Статус === true || activeItem.Статус === "TRUE") return;
        tg.HapticFeedback.impactOccurred('medium');
        
        const user = tg.initDataUnsafe.user || {id: 0, first_name: 'Guest', last_name: '', username: 'none'};
        const fullName = (user.first_name + ' ' + (user.last_name || '')).trim();
        const orderID = ("0" + new Date().getDate()).slice(-2) + ("0" + (new Date().getMonth() + 1)).slice(-2) + "-" + String(user.id).slice(-3);
        
        // Меняем кнопку на "Отправка..."
        const btn = document.querySelector('.action-btn');
        const originalText = btn.innerText;
        btn.innerText = "ОТПРАВЛЯЕМ...";
        btn.disabled = true;

        try {
            await fetch(API_URL, { 
                method: 'POST',
                mode: 'no-cors', // Оставляем no-cors для Google Script POST
                body: JSON.stringify({ 
                    action: "order", 
                    order_id: orderID, 
                    item: activeItem.Название || activeItem.Название_ткани, 
                    sku: activeItem.Артикул || activeItem.Артикул_ткани, 
                    price: activeItem.Цена, 
                    type: currentTab, 
                    user_id: user.id, 
                    user_name: fullName, 
                    user_username: user.username 
                }) 
            });
            
            document.getElementById('orderNumberLabel').innerText = "Номер: " + orderID;
            document.getElementById('successScreen').style.display = 'block';
            document.getElementById('productModal').style.display = 'none';
        } catch(e) { 
            alert("Ошибка при отправке заказа. Попробуйте еще раз.");
            btn.innerText = originalText;
            btn.disabled = false;
        }
    }

    window.changeTab = (tab) => {
        closeModal();
        currentTab = tab;
        document.getElementById('app').innerHTML = '';
        document.getElementById('skeleton-loader').style.display = 'grid';
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('nav-' + tab).classList.add('active');
        
        if (currentData[tab]) {
            setTimeout(() => {
                document.getElementById('skeleton-loader').style.display = 'none';
                render(currentData[tab]);
            }, 100);
        }
    };

    init();
</script>
