<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Moroska Test</title>
</head>
<body>
    <h1 id="status">Проверка связи...</h1>
    <div id="output"></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbza9U1cn6OrhGRZA8hRpNePhzDYN5CmxiSCKJ1Ad4JavJSAtTdbkySj9MsanAKhErXb/exec"; // ВСТАВЬ СВОЮ ССЫЛКУ!

        async function test() {
            const status = document.getElementById('status');
            const output = document.getElementById('output');
            
            try {
                status.innerText = "Запрос к Google отправлен...";
                const res = await fetch(API_URL);
                const data = await res.json();
                status.innerText = "✅ СВЯЗЬ ЕСТЬ!";
                output.innerText = "Найдено листов: " + Object.keys(data).join(', ');
            } catch (err) {
                status.innerText = "❌ ОШИБКА: " + err.message;
            }
        }
        test();
    </script>
</body>
</html>
