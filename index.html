<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    
    // ТВОЯ ССЫЛКА НА СКРИПТ (замени на свою актуальную)
    const API_URL = "https://script.google.com/macros/s/AKfycbzY6jrG5u8_N20fHzDnl-FN-XxcKnePUXYQPlCA7rHO5JXKGtlO0CVphdI8hrtid8bOPw/exec"; 

    let currentData = {};
    let currentTab = 'Stock';
    let activeProduct = null;

    // Функция для безопасного вывода текста (чтобы не ломать верстку)
    function esc(text) {
        if (!text) return '';
        return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // Красивое форматирование цены
    function fmtPrice(num) {
        return new Intl.NumberFormat('ru-RU').format(num || 0);
    }

    tg.MainButton.onClick(() => { if (activeProduct) sendOrder(); });

    async function init() {
        try {
            const res = await fetch(API_URL);
            currentData = await res.json();
            document.getElementById('skeleton-loader').style.display = 'none';
            document.getElementById('app').style.display = 'grid';
            render(currentData.Stock);
        } catch(e) { 
            console.error("Ошибка загрузки:", e);
            document.getElementById('app').innerHTML = '<p style="text-align:center; padding:50px;">Ошибка загрузки данных. Проверьте соединение.</p>';
            document.getElementById('app').style.display = 'block';
        }
    }

    function render(items) {
        const app = document.getElementById('app');
        if (!items || items.length === 0) {
            app.innerHTML = '<p style="grid-column: 1/-1; text-align:center; padding:40px; color:#999;">В этом разделе пока пусто</p>';
            return;
        }

        app.innerHTML = items.map((item, index) => {
            const isFab = currentTab === 'Fabrics';
            // Выбираем название и фото в зависимости от вкладки
            const title = isFab ? (item.Название_ткани || "Без названия") : (item.Название || "Без названия");
            const photoRaw = isFab ? (item.ОписаниеФото || "") : (item.Фото || "");
            const photo = photoRaw.split(',')[0].trim();
            const price = item.Цена || 0;

            return `
                <div class="card" onclick="openProduct('${currentTab}', ${index})">
                    <img src="${esc(photo)}" onerror="this.style.opacity='0.3'" loading="lazy">
                    <div class="card-content">
                        <div class="card-title">${esc(title)}</div>
                        <div class="card-price">${isFab ? '' : fmtPrice(price) + ' RSD'}</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function openProduct(tab, index) {
        const item = currentData[tab][index];
        const isFab = tab === 'Fabrics';
        
        // Для тканей сбрасываем активный товар, чтобы кнопка заказа не работала
        activeProduct = isFab ? null : { name: item.Название, price: item.Цена };

        const modal = document.getElementById('productModal');
        const content = document.getElementById('modalContent');
        const photoField = isFab ? (item.ОписаниеФото || "") : (item.Фото || "");
        const photos = photoField.split(',').filter(p => p.trim() !== "").map(p => p.trim());
        
        content.innerHTML = `
            <div class="carousel-wrapper">
                <div class="carousel" id="mainCarousel" onscroll="syncDots()">
                    ${photos.length > 0 ? photos.map(p => `<img src="${esc(p)}">`).join('') : '<div style="height:200px; background:#eee;"></div>'}
                </div>
                <div class="carousel-dots" id="dots">
                    ${photos.map((_, i) => `<div class="dot ${i===0?'active':''}"></div>`).join('')}
                </div>
            </div>
            <div class="modal-info">
                <h2 style="margin-top:0">${esc(isFab ? item.Название_ткани : item.Название)}</h2>
                ${isFab ? '' : `<div style="margin-bottom:15px; color:#5d7a6d; font-size:24px; font-weight:800;">${fmtPrice(item.Цена)} RSD</div>`}
                <div style="line-height: 1.6; white-space: pre-wrap;">${esc(item.Описание || "")}</div>
            </div>
        `;
        
        modal.style.display = 'block';
        document.body.style.overflow = 'hidden';

        // Кнопка в Telegram
        if (isFab) {
            tg.MainButton.hide();
        } else {
            tg.MainButton.setText('ЗАКАЗАТЬ').show();
        }
    }

    async function sendOrder() {
        tg.MainButton.showProgress();
        const user = tg.initDataUnsafe.user || {id: 0, first_name: 'Guest', username: 'none'};
        try {
            await fetch(API_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify({ 
                    item: activeProduct.name, 
                    price: activeProduct.price, 
                    user_id: user.id, 
                    user_name: user.first_name, 
                    user_username: user.username 
                }) 
            });
            setTimeout(() => {
                document.getElementById('successScreen').style.display = 'block';
                tg.MainButton.hide();
            }, 500);
        } catch(e) { alert("Ошибка при отправке!"); } 
        finally { tg.MainButton.hideProgress(); }
    }

    window.syncDots = function() {
        const c = document.getElementById('mainCarousel');
        if(!c) return;
        const idx = Math.round(c.scrollLeft / (c.offsetWidth || 1));
        document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx));
    }

    window.closeModal = function() {
        document.getElementById('productModal').style.display = 'none';
        document.body.style.overflow = 'auto';
        tg.MainButton.hide();
    }

    window.changeTab = function(tab, el) {
        currentTab = tab;
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        if (currentData[tab]) {
            render(currentData[tab]);
        }
        window.scrollTo(0,0);
    }

    init();
</script>
