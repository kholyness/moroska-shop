<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Moroska Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-color: #5d7a6d; --bg-color: #fcfcfc; --sale-color: rgba(231, 76, 60, 0.95); --bron-color: #f39c12; }
        * { -webkit-touch-callout: none; -webkit-user-select: none; box-sizing: border-box; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg-color); margin: 0; padding-bottom: 100px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; padding: 12px; }
        
        .card { background: white; border-radius: 18px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; position: relative; display: flex; flex-direction: column; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        
        /* Метки */
        .badge { position: absolute; top: 10px; left: 10px; padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: bold; color: white; z-index: 5; }
        .sale-badge { background: var(--sale-color); }
        .bron-badge { background: var(--bron-color); top: auto; bottom: 80px; left: 10px; }

        .card-content { padding: 12px; flex-grow: 1; }
        .card-title { font-size: 14px; font-weight: 600; color: #333; margin-bottom: 5px; height: 36px; overflow: hidden; }
        .card-price { font-weight: bold; color: var(--main-color); font-size: 15px; }

        /* Модалка */
        #productModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; overflow-y: auto; }
        .modal-container { max-width: 600px; margin: 0 auto; padding-bottom: 100px; }
        .modal-close { position: fixed; top: 15px; right: 15px; background: rgba(255,255,255,0.8); width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1001; }
        
        .carousel { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; }
        .carousel img { width: 100%; flex-shrink: 0; scroll-snap-align: start; }

        .modal-info { padding: 20px; }
        .reviews-container { margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
        .review-card { background: #f9f9f9; padding: 12px; border-radius: 12px; margin-bottom: 10px; font-size: 14px; }

        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #eee; height: 70px; align-items: center; z-index: 999; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; text-align: center; font-size: 12px; color: #bbb; cursor: pointer; font-weight: 600; }
        .nav-item.active { color: var(--main-color); }

        #successScreen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; text-align: center; padding: 50px 20px; }
    </style>
</head>
<body>

<div id="app" class="grid"></div>

<div id="productModal">
    <div class="modal-close" onclick="closeModal()">✕</div>
    <div id="modalContent" class="modal-container"></div>
</div>

<div id="successScreen">
    <h1 style="color:var(--main-color)">Бронь принята!</h1>
    <p>Я увидела ваш заказ. Номер брони: <b id="orderIdDisplay"></b></p>
    <p>Сейчас я напишу вам в личные сообщения для уточнения деталей встречи или самовывоза.</p>
    <button onclick="location.reload()" style="background:var(--main-color); color:white; border:none; padding:15px 30px; border-radius:12px; margin-top:20px;">Вернуться в магазин</button>
</div>

<div class="nav">
    <div class="nav-item active" onclick="changeTab('Stock', this)">НАЛИЧИЕ</div>
    <div class="nav-item" onclick="changeTab('Catalog', this)">КАТАЛОГ</div>
    <div class="nav-item" onclick="changeTab('Fabrics', this)">ТКАНИ</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const API_URL = "https://script.google.com/macros/s/AKfycbx8SqvEtioq0UYXiWTazRLU_0X_JYKasyQ8NW12tAwdGMtCeMkNWMTreAFGw-yVA6dA/exec"; 

    let currentData = {};
    let currentTab = 'Stock';
    let activeItem = null;

    async function init() {
        tg.ready();
        const res = await fetch(API_URL);
        currentData = await res.json();
        render(currentData.Stock);
    }

    function render(items) {
        const app = document.getElementById('app');
        app.innerHTML = items
            .filter(item => item.Статус !== "Подтверждено") // Скрываем подтвержденные
            .map((item, index) => {
                const isBron = item.Статус === "Бронь";
                const sale = item.Скидка || "";
                
                return `
                    <div class="card" onclick="openProduct('${currentTab}', ${index})" style="${isBron ? 'opacity: 0.8' : ''}">
                        ${sale ? `<div class="badge sale-badge">${sale}</div>` : ''}
                        ${isBron ? `<div class="badge bron-badge">ЗАБРОНИРОВАНО</div>` : ''}
                        <img src="${item.Фото.split(',')[0].trim()}" loading="lazy">
                        <div class="card-content">
                            <div class="card-title">${item.Название}</div>
                            <div class="card-price">${item.Цена} RSD</div>
                        </div>
                    </div>
                `;
            }).join('');
    }

    function openProduct(tab, index) {
        const item = currentData[tab][index];
        activeItem = item;
        const isBron = item.Статус === "Бронь";
        const reviews = (currentData.Reviews || []).filter(r => r.Модель == item.Модель);

        document.getElementById('modalContent').innerHTML = `
            <div class="carousel">${item.Фото.split(',').map(p => `<img src="${p.trim()}">`).join('')}</div>
            <div class="modal-info">
                <h2>${item.Название}</h2>
                <div style="font-size: 20px; color: var(--main-color); font-weight: 800; margin-bottom: 15px;">${item.Цена} RSD</div>
                <div style="white-space: pre-wrap; line-height: 1.6; color: #444;">${item.Описание}</div>
                <div class="reviews-container">
                    <h3>Отзывы о модели</h3>
                    ${reviews.length ? reviews.map(r => `<div class="review-card"><b>${r.Имя}</b>: ${r.Текст}</div>`).join('') : '<p>Пока нет отзывов</p>'}
                </div>
            </div>
        `;
        document.getElementById('productModal').style.display = 'block';
        
        if (isBron) {
            tg.MainButton.setText('ЗАБРОНИРОВАНО').show().disable();
        } else {
            tg.MainButton.setText(tab === 'Stock' ? 'ЗАБРОНИРОВАТЬ' : 'ЗАКАЗАТЬ ПОШИВ').show().enable();
        }
    }

    tg.MainButton.onClick(async () => {
        tg.MainButton.showProgress();
        const user = tg.initDataUnsafe.user || {id:0, first_name:'User', username:'guest'};
        
        const res = await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: "order",
                sku: activeItem.Артикул,
                price: activeItem.Цена,
                type: currentTab,
                user_username: user.username
            })
        });
        const result = await res.json();
        
        if (result.result === "success") {
            document.getElementById('orderIdDisplay').innerText = result.orderId;
            document.getElementById('successScreen').style.display = 'block';
            tg.MainButton.hide();
        }
    });

    function closeModal() { document.getElementById('productModal').style.display = 'none'; tg.MainButton.hide(); }
    function changeTab(tab, el) { 
        currentTab = tab; 
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); 
        el.classList.add('active'); 
        render(currentData[tab]); 
    }

    init();
</script>
</body>
</html>
