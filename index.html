<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Moroska Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-color: #5d7a6d; --bg-color: #fcfcfc; --sale-color: #e74c3c; --skeleton-bg: #f0f0f0; }
        * { box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg-color); margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; padding: 12px; max-width: 1200px; margin: 0 auto; }
        .skeleton { background: var(--skeleton-bg); border-radius: 18px; aspect-ratio: 4/5; position: relative; overflow: hidden; }
        .skeleton::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent); animation: load 1.5s infinite; }
        @keyframes load { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .card { background: white; border-radius: 18px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; cursor: pointer; }
        .card img { width: 100%; aspect-ratio: 4/5; object-fit: cover; object-position: center; background: #f0f0f0; display: block; }
        
        /* Бейджик скидки */
        .sale-badge { position: absolute; top: 10px; left: 10px; background: var(--sale-color); color: white; padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; z-index: 5; text-transform: uppercase; }
        
        .card-content { padding: 10px; }
        .card-title { font-size: 13px; font-weight: 500; height: 34px; overflow: hidden; margin-bottom: 8px; color: #333; line-height: 1.3; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; gap: 4px; }
        .card-price { font-weight: 700; color: var(--main-color); font-size: 14px; }
        .old-p { text-decoration: line-through; color: #aaa; font-size: 10px; font-weight: 400; display: block; }
        .buy-btn-sm { background: var(--main-color); color: white; border: none; padding: 6px 12px; border-radius: 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; cursor: pointer; }

        /* Модалка */
        #productModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; overflow-y: auto; }
        .modal-close-btn { position: absolute; top: 15px; right: 15px; width: 32px; height: 32px; background: rgba(255,255,255,0.7); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1010; cursor: pointer; color: #333; font-size: 20px; border: none; backdrop-filter: blur(4px); }

        .carousel-wrapper { position: relative; width: 100%; background: #f4f4f4; }
        .carousel { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .carousel::-webkit-scrollbar { display: none; }
        
        /* Пропорции в карусели 1:1 и заполнение */
        .carousel img { width: 100%; flex-shrink: 0; scroll-snap-align: start; aspect-ratio: 1/1; object-fit: cover; }
        
        .dots { display: flex; justify-content: center; gap: 6px; padding: 10px 0; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: #ddd; transition: 0.3s; }
        .dot.active { background: var(--main-color); width: 12px; border-radius: 4px; }

        .nav-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.4); width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10; cursor: pointer; border: none; font-size: 12px; }
        .arrow-left { left: 10px; } .arrow-right { right: 10px; }

        .modal-body { padding: 20px; max-width:600px; margin: 0 auto; }
        .modal-desc { line-height: 1.5; color: #666; font-size: 13px; white-space: pre-wrap; margin-top: 15px; }

        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 75px; border-top: 1px solid #eee; z-index: 999; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; text-align: center; line-height: 70px; font-size: 11px; color: #bbb; cursor: pointer; font-weight: 700; text-transform: uppercase; }
        .nav-item.active { color: var(--main-color); }
        #errorOverlay { display: none; padding: 40px; text-align: center; color: #777; }
        #successScreen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; text-align: center; padding-top: 120px; }
    </style>
</head>
<body>
<div id="skeleton-loader" class="grid"><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div></div>
<div id="errorOverlay">Ошибка загрузки.</div>
<div id="app" class="grid" style="display:none;"></div>
<div id="productModal"><div id="modalContent"></div></div>

<div id="successScreen">
    <h2 style="color:var(--main-color)">Заказ отправлен!</h2>
    <p>Я скоро свяжусь с вами.</p>
    <button onclick="location.reload()" style="background:var(--main-color); color:white; border:none; padding:15px 40px; border-radius:14px; font-weight:bold; cursor:pointer;">ОТЛИЧНО</button>
</div>

<div class="nav">
    <div class="nav-item active" onclick="changeTab('Stock', this)">Наличие</div>
    <div class="nav-item" onclick="changeTab('Catalog', this)">Каталог</div>
    <div class="nav-item" onclick="changeTab('Fabrics', this)">Ткани</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const API_URL = "https://script.google.com/macros/s/AKfycbz0p1mIt9_LUxGtwZhr7aUSTCc--RIe5vEFHKPt0G58mUNSw7j5jvg4GKaAlqWEr5rosg/exec";
    let currentData = {}, currentTab = 'Stock', activeItem = null, isScrolling = false;

    const esc = (str) => { if (!str) return ""; return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); };

    async function logGA(eventName, params) {
        const user = tg.initDataUnsafe.user || {id: 0};
        try { fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "log", user_id: user.id, eventName: eventName, params: params }) }); } catch(e) {}
    }

    async function init() {
        try {
            tg.ready(); tg.expand();
            const res = await fetch(API_URL + "?v=" + new Date().getTime());
            currentData = await res.json();
            document.getElementById('skeleton-loader').style.display = 'none';
            document.getElementById('app').style.display = 'grid';
            render(currentData.Stock);
        } catch (e) {
            document.getElementById('skeleton-loader').style.display = 'none';
            document.getElementById('errorOverlay').style.display = 'block';
        }
    }

    function render(items) {
        const app = document.getElementById('app');
        app.innerHTML = (items || []).map((item, index) => {
            const isFab = currentTab === 'Fabrics';
            const title = isFab ? (item.Название_ткани || "") : (item.Название || "");
            const photo = (item.Фото || "").split(',')[0].trim();
            const sale = String(item.Скидка || "").trim();
            const old = item.Старая_цена || item['Старая цена'] || "";
            const btnText = currentTab === 'Stock' ? 'Купить' : 'Пошив';
            
            return `
                <div class="card" onclick="openProduct('${currentTab}', ${index})">
                    ${(!isFab && sale) ? `<div class="sale-badge">${esc(sale)}</div>` : ''}
                    <img src="${photo}" loading="lazy">
                    <div class="card-content">
                        <div class="card-title">${esc(title)}</div>
                        <div class="card-footer">
                            ${!isFab ? `
                                <div>
                                    ${old ? `<span class="old-p">${esc(old)}</span>` : ''}
                                    <span class="card-price">${esc(item.Price || item.Цена)} <small>RSD</small></span>
                                </div>
                                <button class="buy-btn-sm">${btnText}</button>
                            ` : `<div style="font-size:10px; color:#999;">Ткань</div>`}
                        </div>
                    </div>
                </div>`;
        }).join('');
    }

    function openProduct(tab, index) {
        const item = currentData[tab][index];
        activeItem = item;
        const isFab = tab === 'Fabrics';
        const title = isFab ? (item.Название_ткани || "") : (item.Название || "");
        const photos = (item.Фото || "").split(',').map(p => p.trim());
        const old = item.Старая_цена || item['Старая цена'] || "";
        const sale = String(item.Скидка || "").trim();

        logGA("view_item", { item_name: title, item_category: tab, item_sku: item.Артикул || item.Артикул_ткани || "—" });

        document.getElementById('modalContent').innerHTML = `
            <div class="carousel-wrapper">
                <button class="modal-close-btn" onclick="closeModal()">✕</button>
                ${(!isFab && sale) ? `<div class="sale-badge">${esc(sale)}</div>` : ''}
                ${photos.length > 1 ? `
                    <button class="nav-arrow arrow-left" onclick="scrollC(-1, ${photos.length})">❮</button>
                    <button class="nav-arrow arrow-right" onclick="scrollC(1, ${photos.length})">❯</button>
                ` : ''}
                <div class="carousel" id="modalCarousel" onscroll="updateDots(${photos.length})">
                    ${photos.map(p => `<img src="${p}">`).join('')}
                </div>
                ${photos.length > 1 ? `<div class="dots" id="carouselDots">${photos.map((_,i)=>`<div class="dot ${i===0?'active':''}"></div>`).join('')}</div>` : ''}
            </div>
            <div class="modal-body">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <h2 style="margin:0; font-size:17px; flex:1; padding-right:10px;">${esc(title)}</h2>
                    ${!isFab ? `
                        <div style="text-align:right;">
                            ${old ? `<div class="old-p" style="font-size:11px;">${esc(old)} RSD</div>` : ''}
                            <div style="font-size:18px; font-weight:800; color:var(--main-color);">${esc(item.Price || item.Цена)} <span style="font-size:11px;">RSD</span></div>
                        </div>
                    ` : ''}
                </div>
                <div class="modal-desc">${esc(item.Описание)}</div>
            </div>`;
        
        document.getElementById('productModal').style.display = 'block';
        document.body.style.overflow = 'hidden';
        tg.BackButton.show();
        tg.BackButton.onClick(closeModal);
        if (!isFab) { tg.MainButton.setText(tab === 'Stock' ? 'КУПИТЬ' : 'ЗАКАЗАТЬ ПОШИВ').show(); } else { tg.MainButton.hide(); }
    }

    window.scrollC = (dir, total) => {
        if (isScrolling) return;
        const c = document.getElementById('modalCarousel');
        const width = c.offsetWidth;
        let next = Math.round(c.scrollLeft / width) + dir;
        if (next >= total) next = 0; if (next < 0) next = total - 1;
        isScrolling = true;
        c.scrollTo({ left: next * width, behavior: 'smooth' });
        setTimeout(() => { isScrolling = false; }, 350);
    };

    window.updateDots = (total) => {
        const c = document.getElementById('modalCarousel');
        if(!c) return;
        const idx = Math.round(c.scrollLeft / c.offsetWidth);
        const dots = document.querySelectorAll('.dot');
        if(dots.length) dots.forEach((d, i) => d.classList.toggle('active', i === idx));
    };

    tg.MainButton.onClick(async () => {
        tg.MainButton.showProgress();
        const user = tg.initDataUnsafe.user || {id: 0, first_name: 'Guest', username: 'none'};
        try {
            await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: "order", item: activeItem.Название || activeItem.Название_ткани,
                    sku: activeItem.Артикул || activeItem.Артикул_ткани || "—",
                    price: activeItem.Price || activeItem.Цена || 0, type: currentTab,
                    user_id: user.id, user_name: user.first_name, user_username: user.username
                })
            });
            document.getElementById('successScreen').style.display = 'block';
            tg.MainButton.hide(); tg.BackButton.hide();
        } catch(e) { alert("Ошибка"); } finally { tg.MainButton.hideProgress(); }
    });

    function closeModal() {
        document.getElementById('productModal').style.display = 'none';
        document.body.style.overflow = 'auto';
        tg.MainButton.hide(); tg.BackButton.hide();
        tg.BackButton.offClick(closeModal);
    }

    window.changeTab = (tab, el) => {
        currentTab = tab;
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        render(currentData[tab]);
        window.scrollTo(0,0);
    };

    init();
</script>
</body>
</html>
