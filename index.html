<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Moroska Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-color: #5d7a6d; --accent-color: #e67e22; --bg-color: #f8f9fa; }
        body { font-family: -apple-system, sans-serif; background: var(--bg-color); margin: 0; padding-bottom: 80px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; position: relative; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card-content { padding: 10px; text-align: center; }
        .card-title { font-size: 14px; font-weight: 500; margin-bottom: 5px; height: 35px; overflow: hidden; }
        .card-price { font-weight: bold; color: var(--main-color); font-size: 16px; }
        .old-price { text-decoration: line-through; color: #999; font-size: 12px; margin-right: 5px; }
        .sale-tag { position: absolute; top: 10px; right: 10px; background: #e74c3c; color: white; padding: 2px 8px; border-radius: 5px; font-size: 11px; }

        /* Всплывающее окно товара */
        #productModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; overflow-y: auto; transition: 0.3s; }
        .modal-close { position: absolute; top: 20px; right: 20px; font-size: 30px; z-index: 1001; }
        .modal-img { width: 100%; max-height: 400px; object-fit: cover; }
        .modal-info { padding: 20px; }
        .btn-buy { background: var(--main-color); color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-size: 16px; font-weight: bold; margin-top: 20px; }

        /* Меню */
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #eee; padding: 10px 0; }
        .nav-item { flex: 1; text-align: center; font-size: 12px; color: #888; }
        .nav-item.active { color: var(--main-color); font-weight: bold; }
    </style>
</head>
<body>

<div id="loading" style="text-align:center; margin-top:50px;">Загрузка Moroska...</div>
<div id="app" class="grid"></div>

<div id="productModal">
    <span class="modal-close" onclick="closeModal()">×</span>
    <div id="modalContent"></div>
</div>

<div class="nav">
    <div class="nav-item active" onclick="changeTab('Stock', this)">📦 Наличие</div>
    <div class="nav-item" onclick="changeTab('Catalog', this)">🧵 Модели</div>
    <div class="nav-item" onclick="changeTab('Fabrics', this)">🎨 Ткани</div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    
    const API_URL = "https://script.google.com/macros/s/AKfycbxNIs7VC7os0DrrNbufwsKYr0jSBLw9OE0tWCIhwl2APMVWk8f9mebtgTiGkyFE2tY5ng/exec"; 
    let currentData = {};
    let currentTab = 'Stock';

    async function init() {
        const res = await fetch(API_URL);
        currentData = await res.json();
        document.getElementById('loading').style.display = 'none';
        render(currentData.Stock);
    }

    function render(items) {
        const app = document.getElementById('app');
        app.innerHTML = items.map((item, index) => `
            <div class="card" onclick="openProduct('${currentTab}', ${index})">
                ${item.Скидка ? `<div class="sale-tag">-${item.Скидка}</div>` : ''}
                <img src="${item.Фото.split(',')[0]}" alt="">
                <div class="card-content">
                    <div class="card-title">${item.Название}</div>
                    <div class="card-price">
                        ${item.Старая_цена ? `<span class="old-price">${item.Старая_цена}</span>` : ''}
                        ${item.Цена} RUB
                    </div>
                </div>
            </div>
        `).join('');
    }

    function openProduct(tab, index) {
        const item = currentData[tab][index];
        const modal = document.getElementById('productModal');
        const content = document.getElementById('modalContent');
        
        content.innerHTML = `
            <img class="modal-img" src="${item.Фото.split(',')[0]}">
            <div class="modal-info">
                <h2>${item.Название}</h2>
                <p style="color:#666">${item.Описание}</p>
                <div style="font-size: 20px; font-weight: bold; color:var(--main-color)">${item.Цена} RUB</div>
                <button class="btn-buy" onclick="sendOrder('${item.Название}', '${item.Цена}', '${tab}')">ЗАКАЗАТЬ</button>
            </div>
        `;
        modal.style.display = 'block';
    }

    function closeModal() { document.getElementById('productModal').style.display = 'none'; }

    function changeTab(tab, el) {
        currentTab = tab;
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        render(currentData[tab]);
    }

    async function sendOrder(name, price, tab) {
        const type = tab === 'Stock' ? 'Из наличия' : 'Под заказ';
        const data = {
            action: "order",
            item: name,
            price: price,
            type: type,
            user_id: tg.initDataUnsafe.user.id,
            user_name: tg.initDataUnsafe.user.first_name,
            user_username: tg.initDataUnsafe.user.username
        };
        
        await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
        tg.close(); // Закрываем приложение после заказа
    }

    init();
</script>
</body>
</html>
