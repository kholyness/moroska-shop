<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Moroska</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #fcfcfc; margin: 0; padding: 10px; color: #333; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border: 1px solid #eee; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #f0f0f0; }
        .info { padding: 8px; }
        .price { color: #5d7a6d; font-weight: bold; font-size: 14px; }
        .title { font-size: 13px; margin-bottom: 4px; height: 32px; overflow: hidden; }
        .bron { background: #f39c12; color: white; font-size: 10px; padding: 2px 5px; border-radius: 4px; display: inline-block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="app" class="grid">Загрузка товаров...</div>

<script>
    // ТУТ ТВОЯ ССЫЛКА
    const API_URL = "https://script.google.com/macros/s/AKfycbzniKa9d949e8OoaVBZgBiCy7Kk1JHy8vL9Hjv6rdx39XDKplCNxPTNFGOHhIxBiaoeVw/exec";

    const tg = window.Telegram.WebApp;

    async function init() {
        const app = document.getElementById('app');
        try {
            tg.ready();
            tg.expand();
            
            const response = await fetch(API_URL);
            const data = await response.json();
            
            if (!data.Stock || data.Stock.length === 0) {
                app.innerHTML = '<div style="grid-column: 1/3; text-align: center; padding: 20px;">В наличии пока ничего нет</div>';
                return;
            }

            render(data.Stock);
        } catch (e) {
            app.innerHTML = '<div style="grid-column: 1/3; color: red; padding: 20px;">Ошибка: ' + e.toString() + '</div>';
        }
    }

    function render(items) {
        const app = document.getElementById('app');
        let html = '';
        
        for (let i = 0; i < items.length; i++) {
            const item = items[i];
            
            // Пропускаем проданные
            if (item.Статус === "Продано" || item.Статус === "Подтверждено") continue;

            const isBron = item.Статус === "Бронь";
            const photo = item.Фото ? item.Фото.split(',')[0].trim() : "";
            
            html += '<div class="card" style="' + (isBron ? 'opacity:0.6;' : '') + '">';
            html += '<img src="' + photo + '">';
            html += '<div class="info">';
            if (isBron) html += '<div class="bron">БРОНЬ</div>';
            html += '<div class="title">' + (item.Название || "Без названия") + '</div>';
            html += '<div class="price">' + (item.Цена || 0) + ' RSD</div>';
            html += '</div></div>';
        }
        
        app.innerHTML = html;
    }

    init();
</script>
</body>
</html>
