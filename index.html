<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Moroska Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-color: #5d7a6d; --bg-color: #fcfcfc; --sale-color: #e74c3c; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg-color); margin: 0; padding-bottom: 100px; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; padding: 12px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; border-radius: 18px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; transition: transform 0.2s; position: relative; display: flex; flex-direction: column; }
        .card:active { transform: scale(0.98); }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; pointer-events: none; }
        
        .sale-badge { position: absolute; top: 10px; left: 10px; background: var(--sale-color); color: white; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: bold; z-index: 5; }
        .card-content { padding: 12px; flex-grow: 1; }
        .card-title { font-size: 14px; font-weight: 600; margin-bottom: 5px; height: 38px; overflow: hidden; line-height: 1.3; color: #333; }
        .card-price { font-weight: bold; color: var(--main-color); font-size: 16px; }
        .old-price-card { text-decoration: line-through; color: #aaa; font-size: 12px; margin-right: 6px; }

        #productModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; overflow-y: auto; }
        .modal-container { max-width: 600px; margin: 0 auto; padding-bottom: 120px; }
        .modal-close { position: fixed; top: 15px; right: 15px; font-size: 24px; cursor: pointer; z-index: 1001; color: #333; background: rgba(255,255,255,0.8); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }

        .carousel-wrapper { position: relative; width: 100%; background: #f9f9f9; overflow: hidden; }
        .carousel { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; }
        .carousel::-webkit-scrollbar { display: none; }
        .carousel img { width: 100%; flex-shrink: 0; scroll-snap-align: start; max-height: 500px; object-fit: cover; }
        
        .carousel-dots { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; }
        .dot { width: 6px; height: 6px; background: rgba(255,255,255,0.4); border-radius: 50%; }
        .dot.active { background: white; width: 14px; border-radius: 8px; }

        .modal-info { padding: 20px; }
        .modal-price-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 15px; }
        .modal-current-price { font-size: 24px; font-weight: 800; color: var(--main-color); }
        
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #eee; height: 75px; align-items: center; z-index: 999; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; text-align: center; font-size: 12px; color: #bbb; cursor: pointer; text-transform: uppercase; font-weight: 600; }
        .nav-item.active { color: var(--main-color); font-weight: 800; }

        #error-msg { display: none; text-align: center; padding: 50px; color: #e74c3c; }
        #successScreen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; text-align: center; padding-top: 120px; }
    </style>
</head>
<body>

<div id="loading" style="text-align:center; padding-top: 100px;">Učitavanje Moroska...</div>
<div id="error-msg">Ошибка загрузки. Проверьте интернет.</div>
<div id="app" class="grid"></div>

<div id="productModal">
    <div class="modal-close" onclick="closeModal()">✕</div>
    <div class="modal-container" id="modalContent"></div>
</div>

<div id="successScreen">
    <h1>Готово!</h1>
    <p>Заказ передан мастеру.</p>
    <button onclick="window.open('https://t.me/kholyness')" style="background:var(--main-color); color:white; border:none; padding:15px 30px; border-radius:12px; font-weight:bold;">Написать в ЛС</button>
    <p onclick="location.reload()" style="color:#888; margin-top:20px; cursor:pointer;">← Назад</p>
</div>

<div class="nav">
    <div class="nav-item active" onclick="changeTab('Stock', this)">Наличие</div>
    <div class="nav-item" onclick="changeTab('Catalog', this)">Каталог</div>
    <div class="nav-item" onclick="changeTab('Fabrics', this)">Ткани</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const API_URL = "https://script.google.com/macros/s/AKfycbzql0xdFpheyvXVaiWFARTAD8uUJaomTqeSzb6XyVYljyhPbSC-Q61C_wB7xI8hY-LURw/exec"; 
    let currentData = {};
    let activeItem = null;

    // XSS Protection
    function esc(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Нормализация данных (убираем пробелы и подчеркивания в ключах)
    function normalize(obj) {
        let newObj = {};
        for (let key in obj) {
            let newKey = key.trim().replace(/\s+/g, '_');
            newObj[newKey] = obj[key];
        }
        return newObj;
    }

    async function init() {
        try {
            const res = await fetch(API_URL);
            if (!res.ok) throw new Error();
            const rawData = await res.json();
            
            for (let tab in rawData) {
                currentData[tab] = rawData[tab].map(normalize);
            }
            
            document.getElementById('loading').style.display = 'none';
            render(currentData.Stock);
        } catch(e) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error-msg').style.display = 'block';
        }
    }

    function render(items) {
        const app = document.getElementById('app');
        app.innerHTML = items.map((item, index) => {
            const sale = esc(item.Скидка);
            const oldPrice = esc(item.Старая_цена);
            return `
                <div class="card" onclick="openProduct(currentTab, ${index})">
                    ${sale ? `<div class="sale-badge">${sale}</div>` : ''}
                    <img src="${esc(item.Фото.split(',')[0])}" loading="lazy">
                    <div class="card-content">
                        <div class="card-title">${esc(item.Название)}</div>
                        <div class="card-price">
                            ${oldPrice ? `<span class="old-price-card">${oldPrice}</span>` : ''}
                            ${esc(item.Цена)} RSD
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function openProduct(tab, index) {
        activeItem = currentData[tab][index];
        tg.HapticFeedback.impactOccurred('light');
        
        const modal = document.getElementById('productModal');
        const content = document.getElementById('modalContent');
        const photos = activeItem.Фото.split(',').map(url => url.trim());
        
        content.innerHTML = `
            <div class="carousel-wrapper">
                <div class="carousel" id="mainCarousel" onscroll="syncDots()">
                    ${photos.map(p => `<img src="${esc(p)}">`).join('')}
                </div>
                <div class="carousel-dots" id="dots">
                    ${photos.map((_, i) => `<div class="dot ${i===0?'active':''}"></div>`).join('')}
                </div>
            </div>
            <div class="modal-info">
                <h2>${esc(activeItem.Название)}</h2>
                <div class="modal-price-row">
                    ${activeItem.Старая_цена ? `<span style="text-decoration:line-through; color:#aaa;">${esc(activeItem.Старая_цена)} RSD</span>` : ''}
                    <span class="modal-current-price">${esc(activeItem.Цена)} RSD</span>
                </div>
                <div style="line-height: 1.6; white-space: pre-wrap;">${esc(activeItem.Описание)}</div>
            </div>
        `;

        modal.style.display = 'block';
        document.body.style.overflow = 'hidden';

        // Нативная кнопка Telegram
        tg.MainButton.setText(tab === 'Stock' ? 'КУПИТЬ' : 'ЗАКАЗАТЬ');
        tg.MainButton.show();
        tg.MainButton.offClick(handleOrder); // Сброс старых кликов
        tg.MainButton.onClick(handleOrder);
    }

    async function handleOrder() {
        tg.MainButton.showProgress();
        const type = (currentTab === 'Stock') ? 'Iz zaliha' : 'Po porudžbini';
        const user = tg.initDataUnsafe.user || {id: 0, first_name: 'Guest', username: 'none'};
        
        const orderData = {
            action: "order",
            item: activeItem.Название,
            price: activeItem.Цена,
            type: type,
            user_id: user.id,
            user_name: user.first_name,
            user_username: user.username
        };

        try {
            await fetch(API_URL, { method: 'POST', body: JSON.stringify(orderData) });
            tg.HapticFeedback.notificationOccurred('success');
            document.getElementById('successScreen').style.display = 'block';
            tg.MainButton.hide();
        } catch(e) {
            tg.showAlert("Ошибка при оформлении заказа.");
        } finally {
            tg.MainButton.hideProgress();
        }
    }

    window.syncDots = function() {
        const c = document.getElementById('mainCarousel');
        const idx = Math.round(c.scrollLeft / (c.offsetWidth || 1));
        const dots = document.querySelectorAll('.dot');
        dots.forEach((d, i) => d.classList.toggle('active', i === idx));
    }

    window.closeModal = function() {
        document.getElementById('productModal').style.display = 'none';
        document.body.style.overflow = 'auto';
        tg.MainButton.hide();
    }

    window.changeTab = function(tab, el) {
        currentTab = tab;
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        render(currentData[tab]);
        window.scrollTo(0,0);
    }

    init();
</script>
</body>
</html>
