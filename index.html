<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Moroska</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-color: #5d7a6d; --bg-color: #fcfcfc; --sale-color: #e74c3c; --skeleton-bg: #f0f0f0; }
        * { box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg-color); margin: 0; padding-bottom: 100px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; padding: 12px; }
        .skeleton { background: var(--skeleton-bg); border-radius: 18px; height: 220px; position: relative; overflow: hidden; }
        .skeleton::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent); animation: l 1.5s infinite; }
        @keyframes l { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        .card { background: white; border-radius: 18px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .sale-badge { position: absolute; top: 10px; left: 10px; background: var(--sale-color); color: white; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; z-index: 5; }
        .card-content { padding: 12px; }
        .card-title { font-size: 14px; font-weight: 600; height: 36px; overflow: hidden; margin-bottom: 5px; }
        .card-price { font-weight: bold; color: var(--main-color); }
        .old-p { text-decoration: line-through; color: #aaa; font-size: 12px; margin-right: 5px; }
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 70px; border-top: 1px solid #eee; z-index: 999; }
        .nav-item { flex: 1; text-align: center; line-height: 70px; font-size: 12px; color: #bbb; cursor: pointer; font-weight: 600; }
        .nav-item.active { color: var(--main-color); }
        #productModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; overflow-y: auto; }
    </style>
</head>
<body>

<div id="skeleton-loader" class="grid">
    <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
</div>

<div id="app" class="grid" style="display:none;"></div>

<div id="productModal">
    <div style="padding: 20px; text-align: right; font-size: 24px;" onclick="closeModal()">✕</div>
    <div id="modalContent"></div>
</div>

<div class="nav">
    <div class="nav-item active" onclick="changeTab('Stock', this)">Наличие</div>
    <div class="nav-item" onclick="changeTab('Catalog', this)">Каталог</div>
    <div class="nav-item" onclick="changeTab('Fabrics', this)">Ткани</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    // ПРОВЕРЬ ЭТУ ССЫЛКУ - она должна быть в кавычках и заканчиваться на /exec
    const API_URL = "https://script.google.com/macros/s/AKfycbyQKMBj_tASZSKchlt0TZc-cUB746jAxB0wpYrAi5eO8gRENb5AC2HECmf1-hHTJ-b8hA/exec";

    let currentData = {}, currentTab = 'Stock';

    async function init() {
        try {
            tg.ready();
            tg.expand();
            console.log("Загрузка данных...");
            
            const response = await fetch(API_URL);
            if (!response.ok) throw new Error('Сеть не ок');
            
            currentData = await response.json();
            console.log("Данные получены:", currentData);

            document.getElementById('skeleton-loader').style.display = 'none';
            document.getElementById('app').style.display = 'grid';
            render(currentData.Stock);
        } catch (e) {
            console.error("Ошибка загрузки:", e);
            document.getElementById('skeleton-loader').innerHTML = `<p style="padding:20px; color:red;">Ошибка связи с таблицей. Проверьте API_URL или интернет. ${e.message}</p>`;
        }
    }

    function render(items) {
        const app = document.getElementById('app');
        if (!items || items.length === 0) {
            app.innerHTML = '<p style="padding:20px;">В этой категории пока пусто.</p>';
            return;
        }
        app.innerHTML = items.map((item, index) => {
            const isFab = currentTab === 'Fabrics';
            const title = isFab ? (item.Название_ткани || "") : (item.Название || "");
            const photo = (item.Фото || "").split(',')[0].trim();
            const sale = String(item.Скидка || "").trim();
            const old = item.Старая_цена || item['Старая цена'] || "";
            
            return `
                <div class="card" onclick="openProduct('${currentTab}', ${index})">
                    ${(!isFab && sale) ? `<div class="sale-badge">${sale}</div>` : ''}
                    <img src="${photo}" onerror="this.src='https://via.placeholder.com/200?text=Moroska'">
                    <div class="card-content">
                        <div class="card-title">${title}</div>
                        ${!isFab ? `<div class="card-price">${old ? `<span class="old-p">${old}</span>` : ''}${item.Цена || 0} RSD</div>` : ''}
                    </div>
                </div>`;
        }).join('');
    }

    function openProduct(tab, index) {
        const item = currentData[tab][index];
        const isFab = tab === 'Fabrics';
        const title = isFab ? (item.Название_ткани || "") : (item.Название || "");
        const photos = (item.Фото || "").split(',').map(p => p.trim());

        document.getElementById('modalContent').innerHTML = `
            <div style="padding: 0 20px 100px 20px;">
                <img src="${photos[0]}" style="width:100%; border-radius:15px; margin-bottom:15px;">
                <h2>${title}</h2>
                <p style="white-space:pre-wrap; line-height:1.6;">${item.Описание || ""}</p>
                ${!isFab ? `<div style="font-size:20px; font-weight:bold; color:var(--main-color);">${item.Цена} RSD</div>` : ''}
            </div>`;
        
        document.getElementById('productModal').style.display = 'block';
        if (!isFab) {
            tg.MainButton.setText("ЗАКАЗАТЬ").show();
            tg.MainButton.onClick(() => {
                tg.sendData(JSON.stringify({item: title, sku: item.Артикул || "—"}));
                tg.MainButton.hide();
            });
        }
    }

    window.closeModal = () => {
        document.getElementById('productModal').style.display = 'none';
        tg.MainButton.hide();
    };

    window.changeTab = (tab, el) => {
        currentTab = tab;
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        render(currentData[tab]);
    };

    init();
</script>
</body>
</html>
