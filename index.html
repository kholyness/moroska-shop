<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Moroska Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --main-color: #5d7a6d; 
            --hover-color: #4a6358;
            --bg-color: #fcfcfc; 
            --text-color: #2c3e50;
        }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg-color); margin: 0; color: var(--text-color);
            padding-bottom: 100px; 
        }

        /* Сетка */
        .grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); 
            gap: 15px; padding: 15px; max-width: 1000px; margin: 0 auto;
        }

        .card { 
            background: white; border-radius: 18px; overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; 
            transition: transform 0.2s, box-shadow 0.2s; position: relative;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card-content { padding: 12px; }
        .card-title { font-size: 15px; font-weight: 600; margin-bottom: 5px; height: 40px; overflow: hidden; }
        .card-price { font-weight: bold; color: var(--main-color); font-size: 17px; }

        /* Модалка */
        #productModal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; z-index: 1000; overflow-y: auto; 
        }
        .modal-container { max-width: 600px; margin: 0 auto; position: relative; }
        .modal-close { 
            position: fixed; top: 20px; right: 20px; font-size: 40px; 
            cursor: pointer; z-index: 1001; color: #888; line-height: 1;
        }
        .modal-close:hover { color: #000; }

        /* Карусель с навигацией */
        .carousel-wrapper { position: relative; width: 100%; overflow: hidden; background: #eee; }
        .carousel { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        .carousel::-webkit-scrollbar { display: none; }
        .carousel img { width: 100%; flex-shrink: 0; scroll-snap-align: start; max-height: 500px; object-fit: cover; }
        
        .carousel-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.7); border: none; width: 40px; height: 40px;
            border-radius: 50%; cursor: pointer; font-size: 20px; z-index: 10; display: flex; align-items: center; justify-content: center;
        }
        .carousel-btn:hover { background: white; }
        .btn-prev { left: 10px; }
        .btn-next { right: 10px; }

        .carousel-dots { 
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); 
            display: flex; gap: 8px; z-index: 10; 
        }
        .dot { width: 8px; height: 8px; background: rgba(255,255,255,0.5); border-radius: 50%; cursor: pointer; }
        .dot.active { background: white; width: 20px; border-radius: 10px; }

        .modal-info { padding: 25px; }
        .btn-action { 
            background: var(--main-color); color: white; border: none; 
            width: 100%; padding: 18px; border-radius: 12px; 
            font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-action:hover { background: var(--hover-color); transform: scale(1.02); }

        /* Нижнее меню */
        .nav { 
            position: fixed; bottom: 0; width: 100%; background: white; 
            display: flex; border-top: 1px solid #eee; height: 80px; align-items: center; z-index: 999;
        }
        .nav-item { 
            flex: 1; text-align: center; font-size: 14px; color: #999; 
            cursor: pointer; transition: 0.2s; text-transform: uppercase; font-weight: 500;
        }
        .nav-item:hover { color: var(--main-color); }
        .nav-item.active { color: var(--main-color); font-weight: 800; }

        #successScreen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 2000; text-align: center; padding-top: 100px;
        }

        /* Скрыть стрелки на тач-устройствах для чистоты */
        @media (pointer: coarse) { .carousel-btn { display: none; } }
    </style>
</head>
<body>

<div id="loading" style="text-align:center; padding: 100px;">Загружаем Moroska...</div>
<div id="app" class="grid"></div>

<div id="productModal">
    <span class="modal-close" onclick="closeModal()">×</span>
    <div class="modal-container" id="modalContent"></div>
</div>

<div id="successScreen">
    <h1>🍓 Спасибо!</h1>
    <p>Ваш запрос отправлен мастеру Moroska.</p>
    <button class="btn-action" style="width: 80%;" onclick="window.open('https://t.me/kholyness')">Написать мастеру в ЛС</button>
    <p style="margin-top: 20px; color: #888; cursor:pointer" onclick="location.reload()">Вернуться в магазин</p>
</div>

<div class="nav">
    <div class="nav-item active" onclick="changeTab('Stock', this)">Наличие</div>
    <div class="nav-item" onclick="changeTab('Catalog', this)">Каталог</div>
    <div class="nav-item" onclick="changeTab('Fabrics', this)">Ткани</div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    
    const API_URL = "https://script.google.com/macros/s/AKfycbxNIs7VC7os0DrrNbufwsKYr0jSBLw9OE0tWCIhwl2APMVWk8f9mebtgTiGkyFE2tY5ng/exec"; 
    let currentData = {};
    let currentTab = 'Stock';

    async function init() {
        try {
            const res = await fetch(API_URL);
            currentData = await res.json();
            document.getElementById('loading').style.display = 'none';
            render(currentData.Stock);
        } catch(e) { console.error(e); }
    }

    function render(items) {
        const app = document.getElementById('app');
        app.innerHTML = items.map((item, index) => `
            <div class="card" onclick="openProduct('${currentTab}', ${index})">
                <img src="${item.Фото.split(',')[0].trim()}" alt="">
                <div class="card-content">
                    <div class="card-title">${item.Название}</div>
                    <div class="card-price">${item.Цена} RUB</div>
                </div>
            </div>
        `).join('');
    }

    function openProduct(tab, index) {
        const item = currentData[tab][index];
        const modal = document.getElementById('productModal');
        const content = document.getElementById('modalContent');
        const photos = item.Фото.split(',').map(url => url.trim());
        
        // Логика текста кнопки
        const btnText = (tab === 'Stock') ? 'КУПИТЬ' : 'ЗАКАЗАТЬ';
        
        content.innerHTML = `
            <div class="carousel-wrapper">
                ${photos.length > 1 ? `<button class="carousel-btn btn-prev" onclick="moveCarousel(-1)">‹</button>` : ''}
                <div class="carousel" id="mainCarousel" onscroll="updateDots()">
                    ${photos.map(p => `<img src="${p}">`).join('')}
                </div>
                ${photos.length > 1 ? `<button class="carousel-btn btn-next" onclick="moveCarousel(1)">›</button>` : ''}
                <div class="carousel-dots" id="dots">
                    ${photos.map((_, i) => `<div class="dot ${i===0?'active':''}" onclick="scrollToImage(${i})"></div>`).join('')}
                </div>
            </div>
            <div class="modal-info">
                <h2>${item.Название}</h2>
                <div style="font-size: 22px; font-weight: bold; color:var(--main-color); margin-bottom: 15px;">${item.Цена} RUB</div>
                <p style="line-height: 1.6; color: #555; white-space: pre-wrap;">${item.Описание}</p>
                <button class="btn-action" onclick="sendOrder('${item.Название}', '${item.Цена}', '${tab}')">${btnText}</button>
            </div>
        `;
        modal.style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    // Функции карусели
    function moveCarousel(dir) {
        const c = document.getElementById('mainCarousel');
        c.scrollLeft += dir * c.offsetWidth;
    }
    function scrollToImage(idx) {
        const c = document.getElementById('mainCarousel');
        c.scrollLeft = idx * c.offsetWidth;
    }
    function updateDots() {
        const c = document.getElementById('mainCarousel');
        const idx = Math.round(c.scrollLeft / c.offsetWidth);
        const dots = document.querySelectorAll('.dot');
        dots.forEach((d, i) => d.classList.toggle('active', i === idx));
    }

    function closeModal() { 
        document.getElementById('productModal').style.display = 'none'; 
        document.body.style.overflow = 'auto';
    }

    function changeTab(tab, el) {
        currentTab = tab;
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        render(currentData[tab]);
        window.scrollTo(0,0);
    }

    async function sendOrder(name, price, tab) {
        const type = (tab === 'Stock') ? 'Из наличия' : 'Под заказ';
        const user = tg.initDataUnsafe.user || {id: '266696995', first_name: 'Admin', username: 'kholyness'};
        
        document.getElementById('successScreen').style.display = 'block';
        
        await fetch(API_URL, { 
            method: 'POST', 
            body: JSON.stringify({
                action: "order", item: name, price: price, type: type,
                user_id: user.id, user_name: user.first_name, user_username: user.username
            }) 
        });
    }

    init();
</script>
</body>
</html>
