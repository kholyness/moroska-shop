<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Moroska Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #fcfcfc; margin: 0; padding: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); position: relative; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .info { padding: 10px; }
        .price { color: #5d7a6d; font-weight: bold; }
        .bron-label { position: absolute; top: 10px; left: 10px; background: orange; color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; }
    </style>
</head>
<body>

<div id="app" class="grid">Загрузка мастерской...</div>

<script>
    // --- НАСТРОЙКИ ---
    const API_URL = "https://script.google.com/macros/s/AKfycbznIKa9d949e8OoaVBZgBiCy7Kk1JhY8vL9Hjv6rdx39XDKpICNxPTNFGOHhIxBIaoeVw/exec"; 
    // -----------------

    const tg = window.Telegram.WebApp;

    async function loadData() {
        const app = document.getElementById('app');
        try {
            tg.ready();
            tg.expand();
            
            const response = await fetch(API_URL);
            const data = await response.json();
            
            if (!data.Stock) {
                app.innerHTML = "Ошибка: Лист Stock не найден";
                return;
            }

            render(data.Stock);
        } catch (e) {
            app.innerHTML = "Ошибка связи с таблицей: " + e.message;
        }
    }

    function render(items) {
        const app = document.getElementById('app');
        app.innerHTML = items
            .filter(item => item.Статус !== "Подтверждено" && item.Статус !== "Продано")
            .map(item => {
                const isBron = item.Статус === "Бронь";
                const photo = item.Фото ? item.Фото.split(',')[0].trim() : "";
                
                return `
                    <div class="card" style="${isBron ? 'opacity: 0.6' : ''}">
                        ${isBron ? '<div class="bron-label">БРОНЬ</div>' : ''}
                        <img src="${photo}">
                        <div class="info">
                            <div style="font-size:14px; margin-bottom:5px;">${item.Название || 'Без названия'}</div>
                            <div class="price">${item.Цена || 0} RSD</div>
                        </div>
                    </div>
                `;
            }).join('');
    }

    loadData();
</script>
</body>
</html>
