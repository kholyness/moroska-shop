<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Moroska Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --mc: #5d7a6d; --bg: #fcfcfc; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; padding: 15px; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card-info { padding: 10px; font-size: 14px; }
        .price { color: var(--mc); font-weight: bold; }
        #status { padding: 20px; text-align: center; color: #666; }
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 60px; border-top: 1px solid #eee; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; color: #bbb; cursor: pointer; }
        .nav-item.active { color: var(--mc); border-bottom: 3px solid var(--mc); }
        #debug-log { font-size: 10px; color: red; padding: 10px; }
    </style>
</head>
<body>

<div id="status">⏳ Загрузка товаров...</div>
<div id="debug-log"></div>
<div id="app" class="grid" style="display:none;"></div>

<div class="nav">
    <div class="nav-item active" onclick="changeTab('Stock', this)">Наличие</div>
    <div class="nav-item" onclick="changeTab('Catalog', this)">Каталог</div>
    <div class="nav-item" onclick="changeTab('Fabrics', this)">Ткани</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    // --- ТВОЯ ССЫЛКА НИЖЕ ---
    const API_URL = "https://script.google.com/macros/s/AKfycbza9U1cn6OrhGRZA8hRpNePhzDYN5CmxiSCKJ1Ad4JavJSAtTdbkySj9MsanAKhErXb/exec";

    let fullData = {};

    function log(msg) {
        document.getElementById('debug-log').innerText += msg + "\n";
    }

    async function init() {
        tg.ready();
        tg.expand();
        log("Запуск скрипта...");

        if (API_URL.includes("ВСТАВЬ_СЮДА")) {
            document.getElementById('status').innerText = "❌ Ошибка: Вы не вставили ссылку API_URL в коде GitHub!";
            return;
        }

        try {
            log("Запрос к Google Scripts...");
            const res = await fetch(API_URL);
            if (!res.ok) throw new Error("Сервер ответил ошибкой: " + res.status);
            
            fullData = await res.json();
            log("Данные получены!");

            document.getElementById('status').style.display = 'none';
            document.getElementById('app').style.display = 'grid';
            
            render('Stock');
        } catch (err) {
            log("КРИТИЧЕСКАЯ ОШИБКА: " + err.message);
            document.getElementById('status').innerText = "❌ Ошибка загрузки данных";
        }
    }

    function render(tab) {
        const app = document.getElementById('app');
        const items = fullData[tab] || [];
        
        if (items.length === 0) {
            app.innerHTML = '<p style="grid-column:1/-1; text-align:center;">В этой категории пусто</p>';
            return;
        }

        app.innerHTML = items.map(item => `
            <div class="card">
                <img src="${(item.Фото || '').split(',')[0].trim() || 'https://via.placeholder.com/150'}">
                <div class="card-info">
                    <div>${item.Название || item.Название_ткани || 'Без имени'}</div>
                    <div class="price">${item.Цена || ''} RSD</div>
                </div>
            </div>
        `).join('');
    }

    function changeTab(tab, el) {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        render(tab);
    }

    init();
</script>
</body>
</html>
