<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Moroska Store</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KTEG23S2EK"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-KTEG23S2EK');
    </script>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-color: #5d7a6d; --bg-color: #fcfcfc; --sale-color: #e74c3c; --skeleton-bg: #f0f0f0; }
        
        * { -webkit-touch-callout: none; -webkit-user-select: none; } /* UX: Запрет выделения и меню */
        
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg-color); margin: 0; padding-bottom: 100px; -webkit-tap-highlight-color: transparent; }

        .header { position: sticky; top: 0; background: white; padding: 10px 15px; z-index: 100; border-bottom: 1px solid #eee; }
        .search-input { width: 100%; padding: 12px 15px; border-radius: 12px; border: 1px solid #ddd; outline: none; font-size: 15px; box-sizing: border-box; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; padding: 12px; max-width: 1200px; margin: 0 auto; }
        
        .skeleton { background: var(--skeleton-bg); border-radius: 18px; height: 250px; position: relative; overflow: hidden; }
        .skeleton::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent); animation: loading 1.5s infinite; }
        @keyframes loading { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .card { background: white; border-radius: 18px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; transition: transform 0.15s; position: relative; display: flex; flex-direction: column; }
        .card:active { transform: scale(0.96); }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        
        .sale-badge { position: absolute; top: 10px; left: 10px; background: var(--sale-color); color: white; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: bold; z-index: 5; }
        .card-content { padding: 12px; flex-grow: 1; }
        .card-title { font-size: 14px; font-weight: 600; margin-bottom: 5px; height: 38px; overflow: hidden; line-height: 1.3; color: #333; }
        .card-price { font-weight: bold; color: var(--main-color); font-size: 16px; }
        .old-price-card { text-decoration: line-through; color: #aaa; font-size: 12px; margin-right: 6px; font-weight: normal; }

        #productModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; overflow-y: auto; }
        .modal-container { max-width: 600px; margin: 0 auto; padding-bottom: 120px; }
        .modal-close { position: fixed; top: 15px; right: 15px; font-size: 24px; cursor: pointer; z-index: 1001; color: #333; background: rgba(255,255,255,0.8); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }

        .carousel-wrapper { position: relative; width: 100%; background: #f9f9f9; line-height: 0; overflow: hidden; }
        .carousel { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; }
        .carousel::-webkit-scrollbar { display: none; }
        .carousel img { width: 100%; flex-shrink: 0; scroll-snap-align: start; max-height: 550px; object-fit: cover; }
        
        .carousel-dots { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 10; }
        .dot { width: 6px; height: 6px; background: rgba(255,255,255,0.4); border-radius: 50%; }
        .dot.active { background: white; width: 14px; border-radius: 8px; }

        .modal-info { padding: 25px; -webkit-user-select: text; } /* Разрешаем копировать описание */
        .modal-price-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 15px; }
        .modal-current-price { font-size: 26px; font-weight: 800; color: var(--main-color); }

        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #eee; height: 75px; align-items: center; z-index: 999; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; text-align: center; font-size: 13px; color: #bbb; cursor: pointer; text-transform: uppercase; font-weight: 600; }
        .nav-item.active { color: var(--main-color); font-weight: 800; }

        #successScreen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; text-align: center; padding-top: 120px; }
    </style>
</head>
<body>

<div class="header">
    <input type="text" id="searchInput" class="search-input" placeholder="Поиск в Moroska..." oninput="handleSearch()">
</div>

<div id="skeleton-loader" class="grid">
    <div class="skeleton"></div><div class="skeleton"></div>
    <div class="skeleton"></div><div class="skeleton"></div>
</div>

<div id="app" class="grid" style="display:none;"></div>

<div id="productModal">
    <div class="modal-close" onclick="closeModal()">✕</div>
    <div class="modal-container" id="modalContent"></div>
</div>

<div id="successScreen">
    <h1>Готово!</h1>
    <p>Я получила ваш заказ и скоро напишу.</p>
    <button onclick="window.open('https://t.me/kholyness')" style="background:var(--main-color); color:white; border:none; padding:15px 30px; border-radius:12px; font-weight:bold; cursor:pointer;">Написать в ЛС</button>
    <p onclick="location.reload()" style="color:#888; margin-top:20px; cursor:pointer;">← Назад в магазин</p>
</div>

<div class="nav">
    <div class="nav-item active" onclick="changeTab('Stock', this)">Наличие</div>
    <div class="nav-item" onclick="changeTab('Catalog', this)">Каталог</div>
    <div class="nav-item" onclick="changeTab('Fabrics', this)">Ткани</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    
    const API_URL = "https://script.google.com/macros/s/AKfycbwyKP87bZHqiYN0I67tC_Sary6-5OzOwdQGAB3B_--RaItRJXrG10yjoC35htkKjTmG3w/exec"; 

    let currentData = {};
    let currentTab = 'Stock';
    let activeProduct = null;

    // Улучшенная защита и форматирование
    function esc(text) {
        const str = (text === undefined || text === null) ? '' : String(text);
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function fmtPrice(num) {
        return new Intl.NumberFormat('ru-RU').format(num);
    }

    // Инициализация MainButton один раз
    tg.MainButton.onClick(() => {
        if (activeProduct) sendOrder();
    });

    async function init() {
        try {
            const res = await fetch(API_URL);
            currentData = await res.json();
            document.getElementById('skeleton-loader').style.display = 'none';
            document.getElementById('app').style.display = 'grid';
            render(currentData.Stock);
        } catch(e) { console.error("Data error"); }
    }

    function render(items) {
        const app = document.getElementById('app');
        if (!items || items.length === 0) {
            app.innerHTML = '<p style="grid-column: 1/-1; text-align:center; padding:40px; color:#999;">Ничего не найдено</p>';
            return;
        }
        app.innerHTML = items.map((item, index) => {
            const sale = item.Скидка || item['Скидка'] || "";
            const oldPrice = item.Старая_цена || item['Старая цена'] || "";
            const photo = item.Фото || item['Фото'] || "";
            const title = item.Название || item['Название'] || "";
            const price = item.Цена || item['Цена'] || 0;
            
            return `
                <div class="card" onclick="openProduct('${currentTab}', ${index})">
                    ${sale ? `<div class="sale-badge">${esc(sale)}</div>` : ''}
                    <img src="${esc(photo.split(',')[0].trim())}" onerror="this.style.opacity='0.3'" loading="lazy">
                    <div class="card-content">
                        <div class="card-title">${esc(title)}</div>
                        <div class="card-price">
                            ${oldPrice ? `<span class="old-price-card">${fmtPrice(oldPrice)}</span>` : ''}
                            ${fmtPrice(price)} RSD
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function handleSearch() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = currentData[currentTab].filter(item => {
            const t = (item.Название || item['Название'] || "").toLowerCase();
            const d = (item.Описание || item['Описание'] || "").toLowerCase();
            return t.includes(query) || d.includes(query);
        });
        render(filtered);
    }

    function openProduct(tab, index) {
        const item = currentData[tab][index];
        activeProduct = { 
            name: item.Название || item['Название'], 
            price: item.Цена || item['Цена'], 
            tab: tab 
        };

        tg.HapticFeedback.impactOccurred('light');
        if(window.gtag) gtag('event', 'view_item', { 'item_name': activeProduct.name });

        const modal = document.getElementById('productModal');
        const content = document.getElementById('modalContent');
        const photos = (item.Фото || item['Фото'] || "").split(',').map(url => url.trim());
        const sale = item.Скидка || item['Скидка'] || "";
        const oldPrice = item.Старая_цена || item['Старая цена'] || "";
        
        content.innerHTML = `
            <div class="carousel-wrapper">
                ${sale ? `<div class="sale-badge" style="top:15px; left:15px;">${esc(sale)}</div>` : ''}
                <div class="carousel" id="mainCarousel" onscroll="syncDots()">
                    ${photos.map(p => `<img src="${esc(p)}">`).join('')}
                </div>
                <div class="carousel-dots" id="dots">
                    ${photos.map((_, i) => `<div class="dot ${i===0?'active':''}"></div>`).join('')}
                </div>
            </div>
            <div class="modal-info">
                <h2 style="margin-top:0">${esc(activeProduct.name)}</h2>
                <div class="modal-price-row">
                    ${oldPrice ? `<span style="text-decoration:line-through; color:#aaa; font-size:18px;">${fmtPrice(oldPrice)} RSD</span>` : ''}
                    <div class="modal-current-price">${fmtPrice(activeProduct.price)} RSD</div>
                </div>
                <div style="line-height: 1.6; white-space: pre-wrap;">${esc(item.Описание || item['Описание'])}</div>
            </div>
        `;
        modal.style.display = 'block';
        document.body.style.overflow = 'hidden';

        tg.MainButton.setText(tab === 'Stock' ? 'КУПИТЬ' : 'ЗАКАЗАТЬ').show();
    }

    async function sendOrder() {
        tg.MainButton.showProgress();
        const user = tg.initDataUnsafe.user || {id: 0, first_name: 'Guest', username: 'none'};
        
        try {
            await fetch(API_URL, { 
                method: 'POST', 
                body: JSON.stringify({ 
                    action: "order", 
                    item: activeProduct.name, 
                    price: activeProduct.price, 
                    type: (activeProduct.tab === 'Stock' ? 'Наличие' : 'Заказ'), 
                    user_id: user.id, 
                    user_name: user.first_name, 
                    user_username: user.username 
                }) 
            });
            tg.HapticFeedback.notificationOccurred('success');
            document.getElementById('successScreen').style.display = 'block';
            tg.MainButton.hide();
        } catch(e) {
            tg.showAlert("Ошибка сети.");
        } finally {
            tg.MainButton.hideProgress();
        }
    }

    window.syncDots = function() {
        const c = document.getElementById('mainCarousel');
        const idx = Math.round(c.scrollLeft / (c.offsetWidth || 1));
        document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx));
    }

    window.closeModal = function() {
        document.getElementById('productModal').style.display = 'none';
        document.body.style.overflow = 'auto';
        tg.MainButton.hide();
        activeProduct = null;
    }

    window.changeTab = function(tab, el) {
        currentTab = tab;
        document.getElementById('searchInput').value = '';
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        render(currentData[tab]);
        window.scrollTo(0,0);
    }

    init();
</script>
</body>
</html>
