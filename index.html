<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Moroska Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-color: #5d7a6d; --bg-color: #fcfcfc; --sale-color: #e74c3c; --skeleton-bg: #f0f0f0; }
        * { box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg-color); margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; padding: 12px; }
        .skeleton { background: var(--skeleton-bg); border-radius: 18px; aspect-ratio: 4/5; }
        .card { background: white; border-radius: 18px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; }
        .card img { width: 100%; aspect-ratio: 4/5; object-fit: cover; display: block; }
        .sale-badge { position: absolute; top: 10px; left: 10px; background: var(--sale-color); color: white; padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; z-index: 5; }
        .card-content { padding: 10px; }
        .card-title { font-size: 13px; font-weight: 500; height: 34px; overflow: hidden; margin-bottom: 8px; color: #333; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; }
        .card-price { font-weight: 700; color: var(--main-color); font-size: 14px; }
        .old-p { text-decoration: line-through; color: #aaa; font-size: 10px; }
        .buy-btn-sm { background: var(--main-color); color: white; border: none; padding: 6px 12px; border-radius: 10px; font-size: 10px; font-weight: 700; }
        #productModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; overflow-y: auto; }
        .modal-close-btn { position: absolute; top: 15px; right: 15px; width: 32px; height: 32px; background: rgba(255,255,255,0.7); border-radius: 50%; z-index: 1010; border: none; font-size: 20px; }
        .carousel-wrapper { position: relative; width: 100%; }
        .carousel { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .carousel::-webkit-scrollbar { display: none; }
        .carousel img { width: 100%; flex-shrink: 0; scroll-snap-align: start; aspect-ratio: 1/1; object-fit: cover; }
        .dots { display: flex; justify-content: center; gap: 6px; padding: 10px 0; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: #ddd; }
        .dot.active { background: var(--main-color); width: 12px; border-radius: 4px; }
        .modal-body { padding: 20px; }
        .modal-desc { line-height: 1.5; color: #666; font-size: 13px; white-space: pre-wrap; margin-top: 15px; }
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 75px; border-top: 1px solid #eee; z-index: 999; }
        .nav-item { flex: 1; text-align: center; line-height: 70px; font-size: 11px; color: #bbb; font-weight: 700; cursor: pointer; }
        .nav-item.active { color: var(--main-color); }
        #errorOverlay { display: none; padding: 40px; text-align: center; color: #777; }
        #successScreen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; text-align: center; padding-top: 120px; }
    </style>
</head>
<body>
<div id="skeleton-loader" class="grid"><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div></div>
<div id="errorOverlay">Ошибка загрузки.</div>
<div id="app" class="grid" style="display:none;"></div>
<div id="productModal"><div id="modalContent"></div></div>
<div id="successScreen">
    <h2 style="color:var(--main-color)">Заказ №<span id="orderNumberLabel"></span> отправлен!</h2>
    <button onclick="location.reload()" style="background:var(--main-color); color:white; border:none; padding:15px 40px; border-radius:14px; margin-top:20px;">ОТЛИЧНО</button>
</div>
<div class="nav">
    <div class="nav-item active" onclick="changeTab('Stock', this)">Наличие</div>
    <div class="nav-item" onclick="changeTab('Catalog', this)">Каталог</div>
    <div class="nav-item" onclick="changeTab('Fabrics', this)">Ткани</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const API_URL = "https://script.google.com/macros/s/AKfycbycxVPLnvyw89_Z_VutfDtYGss_PoVm-j-D7xT4lljYCqST7Be1yXxREZ_5Gws6CroZjA/exec";
    let currentData = {}, currentTab = 'Stock', activeItem = null;

    const esc = (str) => String(str || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

    // ФУНКЦИЯ ОБРАБОТКИ ДАННЫХ (JSONP)
    window.handleData = function(data) {
        currentData = data;
        if (currentData.Stock) {
            document.getElementById('skeleton-loader').style.display = 'none';
            document.getElementById('app').style.display = 'grid';
            render(currentData.Stock);
        } else {
            document.getElementById('errorOverlay').innerText = "Ошибка: Лист Stock не найден";
        }
    };

    function init() {
        tg.ready(); tg.expand();
        const script = document.createElement('script');
        script.src = API_URL + "?callback=handleData&v=" + Date.now();
        script.onerror = () => { document.getElementById('errorOverlay').style.display = 'block'; };
        document.body.appendChild(script);
    }

    function render(items) {
        const app = document.getElementById('app');
        app.innerHTML = (items || []).map((item, index) => {
            const isFab = currentTab === 'Fabrics';
            const title = isFab ? item.Название_ткани : item.Название;
            const photo = (item.Фото || "").split(',')[0].trim();
            const old = item.Старая_цена || item['Старая цена'];
            return `
                <div class="card" onclick="openProduct('${currentTab}', ${index})">
                    ${(!isFab && item.Скидка) ? `<div class="sale-badge">${esc(item.Скидка)}</div>` : ''}
                    <img src="${photo}">
                    <div class="card-content">
                        <div class="card-title">${esc(title)}</div>
                        <div class="card-footer">
                            ${!isFab ? `<div>${old ? `<span class="old-p">${esc(old)}</span>` : ''}<span class="card-price">${esc(item.Цена)} RSD</span></div><button class="buy-btn-sm">ЗАКАЗ</button>` : '<div style="font-size:10px;color:#999;">Ткань</div>'}
                        </div>
                    </div>
                </div>`;
        }).join('');
    }

    function openProduct(tab, index) {
        const item = currentData[tab][index];
        activeItem = item;
        const photos = (item.Фото || "").split(',').map(p => p.trim());
        document.getElementById('modalContent').innerHTML = `
            <div class="carousel-wrapper">
                <button class="modal-close-btn" onclick="closeModal()">✕</button>
                <div class="carousel" id="modalCarousel" onscroll="updateDots(${photos.length})">${photos.map(p => `<img src="${p}">`).join('')}</div>
                ${photos.length > 1 ? `<div class="dots">${photos.map((_,i)=>`<div class="dot ${i===0?'active':''}"></div>`).join('')}</div>` : ''}
            </div>
            <div class="modal-body">
                <h2 style="font-size:18px;margin:0;">${esc(item.Название || item.Название_ткани)}</h2>
                <div class="card-price" style="font-size:20px;margin:10px 0;">${esc(item.Цена)} RSD</div>
                <div class="modal-desc">${esc(item.Описание)}</div>
            </div>`;
        document.getElementById('productModal').style.display = 'block';
        tg.MainButton.setText(tab === 'Stock' ? 'КУПИТЬ' : 'ЗАКАЗАТЬ ПОШИВ').show();
    }

    tg.MainButton.onClick(async () => {
        tg.MainButton.showProgress();
        const user = tg.initDataUnsafe.user || {id: 0, first_name: 'Guest'};
        const orderID = ("0" + new Date().getDate()).slice(-2) + ("0" + (new Date().getMonth() + 1)).slice(-2) + "-" + String(user.id).slice(-3);
        
        try {
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "order", order_id: orderID, item: activeItem.Название || activeItem.Название_ткани, sku: activeItem.Артикул || activeItem.Артикул_ткани, price: activeItem.Цена, type: currentTab, user_id: user.id, user_name: user.first_name, user_username: user.username }) });
            document.getElementById('orderNumberLabel').innerText = orderID;
            document.getElementById('successScreen').style.display = 'block';
            tg.MainButton.hide();
        } catch(e) { alert("Ошибка заказа"); } finally { tg.MainButton.hideProgress(); }
    });

    function updateDots(total) {
        const c = document.getElementById('modalCarousel');
        const idx = Math.round(c.scrollLeft / c.offsetWidth);
        document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx));
    }

    function closeModal() { document.getElementById('productModal').style.display = 'none'; tg.MainButton.hide(); }
    window.changeTab = (tab, el) => { currentTab = tab; document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); render(currentData[tab]); };
    init();
</script>
</body>
</html>
