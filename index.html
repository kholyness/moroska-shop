<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Moroska</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-color: #5d7a6d; --bg-color: #fcfcfc; --sale-color: #e74c3c; --skeleton-bg: #f0f0f0; }
        * { -webkit-touch-callout: none; -webkit-user-select: none; box-sizing: border-box; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg-color); margin: 0; padding-bottom: 100px; }
        .header { position: sticky; top: 0; background: white; padding: 10px 15px; z-index: 100; border-bottom: 1px solid #eee; }
        .search-input { width: 100%; padding: 12px 15px; border-radius: 12px; border: 1px solid #ddd; outline: none; font-size: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; padding: 12px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; border-radius: 18px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; display: flex; flex-direction: column; position: relative; transition: transform 0.1s; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #eee; }
        .sale-badge { position: absolute; top: 10px; left: 10px; background: var(--sale-color); color: white; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; z-index: 5; text-transform: uppercase; }
        .card-content { padding: 12px; flex-grow: 1; }
        .card-title { font-size: 14px; font-weight: 600; margin-bottom: 5px; height: 36px; overflow: hidden; line-height: 1.3; }
        .card-price { font-weight: bold; color: var(--main-color); font-size: 15px; display: flex; align-items: center; gap: 6px; }
        .old-p { text-decoration: line-through; color: #aaa; font-size: 12px; font-weight: normal; }
        .skeleton { background: var(--skeleton-bg); border-radius: 18px; height: 250px; position: relative; overflow: hidden; }
        .skeleton::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent); animation: loading 1.5s infinite; }
        @keyframes loading { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        #productModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; overflow-y: auto; }
        .modal-container { max-width: 600px; margin: 0 auto; padding-bottom: 120px; }
        .modal-close { position: fixed; top: 15px; right: 15px; background: rgba(255,255,255,0.8); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1001; backdrop-filter: blur(5px); cursor: pointer; }
        .carousel-wrapper { position: relative; width: 100%; }
        .carousel { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; }
        .carousel::-webkit-scrollbar { display: none; }
        .carousel img { width: 100%; flex-shrink: 0; scroll-snap-align: start; max-height: 500px; object-fit: cover; }
        .nav-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.7); width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10; cursor: pointer; border: none; font-weight: bold; }
        .arrow-left { left: 10px; } .arrow-right { right: 10px; }
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #eee; height: 75px; align-items: center; z-index: 999; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; text-align: center; font-size: 12px; color: #bbb; cursor: pointer; font-weight: 600; text-transform: uppercase; }
        .nav-item.active { color: var(--main-color); }
        #successScreen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; text-align: center; padding-top: 100px; }
    </style>
</head>
<body>
<div class="header"><input type="text" id="searchInput" class="search-input" placeholder="Поиск в Moroska..." oninput="handleSearch()"></div>
<div id="skeleton-loader" class="grid"><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div></div>
<div id="app" class="grid" style="display:none;"></div>
<div id="productModal"><div class="modal-close" onclick="closeModal()">✕</div><div id="modalContent" class="modal-container"></div></div>
<div id="successScreen"><h1>Готово!</h1><p>Я скоро свяжусь с вами.</p><button onclick="location.reload()" style="background:var(--main-color); color:white; border:none; padding:15px 30px; border-radius:12px;">Ок</button></div>
<div class="nav"><div class="nav-item active" onclick="changeTab('Stock', this)">Наличие</div><div class="nav-item" onclick="changeTab('Catalog', this)">Каталог</div><div class="nav-item" onclick="changeTab('Fabrics', this)">Ткани</div></div>

<script>
    const tg = window.Telegram.WebApp;
    const API_URL = "https://script.google.com/macros/s/AKfycbyQKMBj_tASZSKchlt0TZc-cUB746jAxB0wpYrAi5eO8gRENb5AC2HECmf1-hHTJ-b8hA/exec"; 
    let currentData = {}, currentTab = 'Stock', activeItem = null;

    async function init() {
        try {
            tg.ready(); tg.expand();
            const res = await fetch(API_URL);
            currentData = await res.json();
            document.getElementById('skeleton-loader').style.display = 'none';
            document.getElementById('app').style.display = 'grid';
            render(currentData.Stock);
        } catch(e) { console.error(e); }
    }

    function render(items) {
        const app = document.getElementById('app');
        app.innerHTML = (items || []).map((item, index) => {
            const isFab = currentTab === 'Fabrics';
            const title = isFab ? (item.Название_ткани || "") : (item.Название || "");
            const photo = (item.Фото || "").split(',')[0].trim();
            
            // ПРОВЕРКА SALE: берем из колонки Скидка, превращаем в строку и убираем пробелы
            const saleVal = String(item.Скидка || item['Скидка'] || "").trim();
            const oldP = item.Старая_цена || item['Старая цена'] || "";

            return `
                <div class="card" onclick="openProduct('${currentTab}', ${index})">
                    ${(!isFab && saleVal.length > 0) ? `<div class="sale-badge">${saleVal}</div>` : ''}
                    <img src="${photo}" loading="lazy">
                    <div class="card-content">
                        <div class="card-title">${title}</div>
                        ${!isFab ? `<div class="card-price">${oldP ? `<span class="old-p">${oldP}</span>` : ''}<span>${item.Цена || 0} RSD</span></div>` : ''}
                    </div>
                </div>`;
        }).join('');
    }

    function openProduct(tab, index) {
        const item = currentData[tab][index]; activeItem = item;
        const isFab = tab === 'Fabrics';
        const title = isFab ? (item.Название_ткани || "") : (item.Название || "");
        const photos = (item.Фото || "").split(',').map(p => p.trim());
        const oldP = item.Старая_цена || item['Старая цена'] || "";

        document.getElementById('modalContent').innerHTML = `
            <div class="carousel-wrapper">
                ${photos.length > 1 ? `<button class="nav-arrow arrow-left" onclick="scrollCarousel(-1)">❮</button><button class="nav-arrow arrow-right" onclick="scrollCarousel(1)">❯</button>` : ''}
                <div class="carousel" id="modalCarousel">${photos.map(p => `<img src="${p}">`).join('')}</div>
            </div>
            <div class="modal-info">
                ${!isFab ? `<div style="font-size:24px; font-weight:800; color:var(--main-color); margin-bottom:10px;">${oldP ? `<span class="old-p" style="font-size:18px; margin-right:10px;">${oldP} RSD</span>` : ''}${item.Цена || 0} RSD</div>` : ''}
                <h2 style="margin:0 0 15px 0;">${title}</h2>
                <div style="line-height:1.6; white-space:pre-wrap; color:#444;">${item.Описание || ""}</div>
            </div>`;
        document.getElementById('productModal').style.display = 'block';
        document.body.style.overflow = 'hidden';
        if (!isFab) { tg.MainButton.setText(tab === 'Stock' ? 'КУПИТЬ' : 'ЗАКАЗАТЬ ПОШИВ').show(); } else { tg.MainButton.hide(); }
    }

    tg.MainButton.onClick(async () => {
        tg.MainButton.showProgress();
        const user = tg.initDataUnsafe.user || {id: '—', first_name: 'Guest', username: 'none'};
        try {
            await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: "order",
                    item: activeItem.Название || activeItem.Название_ткани,
                    sku: activeItem.Артикул || activeItem.Артикул_ткани || "—",
                    price: activeItem.Цена || 0,
                    type: currentTab,
                    user_id: user.id, user_name: user.first_name, user_username: user.username
                })
            });
            document.getElementById('successScreen').style.display = 'block';
            tg.MainButton.hide();
        } catch(e) { alert("Ошибка"); } finally { tg.MainButton.hideProgress(); }
    });

    window.scrollCarousel = (d) => { const c = document.getElementById('modalCarousel'); c.scrollBy({ left: c.offsetWidth * d, behavior: 'smooth' }); };
    window.closeModal = () => { document.getElementById('productModal').style.display = 'none'; document.body.style.overflow = 'auto'; tg.MainButton.hide(); };
    window.changeTab = (tab, el) => { currentTab = tab; document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); render(currentData[tab]); window.scrollTo(0,0); };
    window.handleSearch = () => {
        const q = document.getElementById('searchInput').value.toLowerCase();
        render((currentData[currentTab] || []).filter(item => (item.Название || item.Название_ткани || "").toLowerCase().includes(q)));
    };
    init();
</script>
</body>
</html>
